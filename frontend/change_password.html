<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Αλλαγή Κωδικού | LP Technotherm</title>
    <meta name="description" content="Ορισμός νέου κωδικού πρόσβασης - LP Technotherm">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="card">

        <!-- ── Header ────────────────────────────────────────────────── -->
        <div class="card-header">
            <div class="logo-circle">
                <img src="images/logo.png" alt="LP Technotherm Logo">
            </div>
            <h1>Νέος Κωδικός Πρόσβασης</h1>
            <p class="header-subtitle">LP Technotherm - Εταιρεία Μηχανολογικών Εγκαταστάσεων</p>
        </div>

        <!-- ── Body ──────────────────────────────────────────────────── -->
        <div class="card-body">

            <div id="alertError" class="alert error"></div>

            <form id="resetForm" action="../Backend/Change_password.php" method="POST">
                <!-- Token injected from URL -->
                <input type="hidden" id="token" name="token">

                <!-- New password -->
                <div class="form-group">
                    <label for="password">Νέος Κωδικός</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <!-- lock icon -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                        </span>
                        <input type="password" id="password" name="password" placeholder="Τουλάχιστον 8 χαρακτήρες"
                            minlength="8" required>
                    </div>
                    <div class="password-strength">
                        <div class="password-strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="strength-label" id="strengthLabel"></div>
                </div>

                <!-- Confirm password -->
                <div class="form-group">
                    <label for="confirm_password">Επιβεβαίωση Κωδικού</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <!-- shield-check icon -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                                <path d="m9 12 2 2 4-4" />
                            </svg>
                        </span>
                        <input type="password" id="confirm_password" name="confirm_password"
                            placeholder="Επαναλάβετε τον κωδικό" required>
                    </div>
                </div>

                <button type="submit" class="btn">
                    <!-- check icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 6 9 17l-5-5" />
                    </svg>
                    Αποθήκευση Κωδικού
                </button>
            </form>

            <div class="links">
                <a href="forgot_password.html">← Αίτημα νέου συνδέσμου</a>
            </div>
        </div>
    </div>

    <script>
        // ── Inject token from URL ──────────────────────────────────────────────
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const error = params.get('error');

        if (!token) {
            const el = document.getElementById('alertError');
            el.textContent = 'Μη έγκυρος ή ληγμένος σύνδεσμος. Παρακαλώ ζητήστε νέον.';
            el.style.display = 'block';
            document.getElementById('resetForm').style.display = 'none';
        } else {
            document.getElementById('token').value = token;
        }

        if (error) {
            const el = document.getElementById('alertError');
            el.textContent = decodeURIComponent(error);
            el.style.display = 'block';
        }

        // ── Password strength indicator ────────────────────────────────────────
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');
        const strengthLabel = document.getElementById('strengthLabel');

        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            let score = 0;
            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const levels = [
                { label: '', color: 'transparent', width: '0%' },
                { label: 'Αδύναμος', color: '#ef4444', width: '25%' },
                { label: 'Μέτριος', color: '#f97316', width: '50%' },
                { label: 'Καλός', color: '#eab308', width: '75%' },
                { label: 'Ισχυρός', color: '#22c55e', width: '100%' },
            ];

            strengthBar.style.width = levels[score].width;
            strengthBar.style.backgroundColor = levels[score].color;
            strengthLabel.textContent = levels[score].label;
        });
    </script>
</body>

</html>
