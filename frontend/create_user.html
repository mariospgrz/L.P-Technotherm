<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Νέος Χρήστης | LP Technotherm</title>
    <meta name="description" content="Δημιουργία νέου χρήστη - LP Technotherm">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="card">

        <!-- Header -->
        <div class="card-header">
            <div class="logo-circle">
                <img src="images/logo.png" alt="LP Technotherm Logo"
                    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <span class="logo-icon" style="display:none">🔧</span>
            </div>
            <h1>Νέος Χρήστης</h1>
            <p class="header-subtitle">LP Technotherm - Εταιρεία Μηχανολογικών Εγκαταστάσεων</p>
        </div>

        <!-- Body -->
        <div class="card-body">

            <!-- Alert messages -->
            <div id="alertSuccess" class="alert success"></div>
            <div id="alertError" class="alert error"></div>

            <form id="createForm" action="/L.P-Technotherm/Backend/CreateUser/create_user.php" method="POST">

                <!-- Username -->
                <div class="form-group">
                    <label for="username">Username *</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg>
                        </span>
                        <input type="text" id="username" name="username" placeholder="π.χ. nikos123" autocomplete="off"
                            required>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Κωδικός * (min. 6 χαρακτήρες)</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                        </span>
                        <input type="password" id="password" name="password" placeholder="Τουλάχιστον 6 χαρακτήρες"
                            minlength="6" required>
                    </div>
                </div>

                <!-- Full name -->
                <div class="form-group">
                    <label for="full_name">Ονοματεπώνυμο *</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                                <circle cx="9" cy="7" r="4" />
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                                <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                            </svg>
                        </span>
                        <input type="text" id="full_name" name="full_name" placeholder="π.χ. Νίκος Παπαδόπουλος"
                            autocomplete="off" required>
                    </div>
                </div>

                <!-- Role -->
                <div class="form-group">
                    <label for="role">Ρόλος *</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                            </svg>
                        </span>
                        <select id="role" name="role" required
                            style="width:100%;padding:0.8rem 1rem 0.8rem 2.8rem;background:var(--input-bg);border:1.5px solid var(--input-border);border-radius:var(--input-radius);color:var(--text-color);font-size:0.95rem;font-family:'Inter',sans-serif;outline:none;appearance:none;">
                            <option value="" disabled selected>Επιλογή ρόλου</option>
                            <option value="administrator">Διαχειριστής (Administrator)</option>
                            <option value="supervisor">Υπεύθυνος (Supervisor)</option>
                            <option value="helper">Βοηθός (Helper)</option>
                        </select>
                    </div>
                </div>

                <!-- Hourly rate -->
                <div class="form-group">
                    <label for="hourly_rate">Ωρομίσθιο (€) — προαιρετικό</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <line x1="12" y1="1" x2="12" y2="23" />
                                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                            </svg>
                        </span>
                        <input type="number" id="hourly_rate" name="hourly_rate" placeholder="π.χ. 15.00" min="0"
                            step="0.01">
                    </div>
                </div>

                <!-- Phone -->
                <div class="form-group">
                    <label for="phone">Τηλέφωνο *</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path
                                    d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 11.9 19.79 19.79 0 0 1 1.63 3.27 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
                            </svg>
                        </span>
                        <input type="text" id="phone" name="phone" placeholder="π.χ. 6912345678" autocomplete="off"
                            required>
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email *</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <rect x="2" y="4" width="20" height="16" rx="2" />
                                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                            </svg>
                        </span>
                        <input type="email" id="email" name="email" placeholder="π.χ. nikos@gmail.com"
                            autocomplete="off" required>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 6 9 17l-5-5" />
                    </svg>
                    Δημιουργία Χρήστη
                </button>

            </form>

            <div class="links">
                <a href="delete_user.html">🗑 Διαγραφή χρήστη</a>
            </div>

        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const success = params.get('success');
        const error = params.get('error');

        if (success) {
            const el = document.getElementById('alertSuccess');
            el.textContent = decodeURIComponent(success);
            el.style.display = 'block';
            // Clear the form on success
            document.getElementById('createForm').reset();
        }
        if (error) {
            const el = document.getElementById('alertError');
            el.textContent = decodeURIComponent(error);
            el.style.display = 'block';
        }
    </script>
</body>

</html>
