<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP Technotherm</title>
    <meta name="description" content="Επαναφορά κωδικού πρόσβασης - LP Technotherm">
    <link rel="stylesheet" href="CSS/passwordreset.css">
</head>

<body>
    <div class="card">

        <!-- ── Header ────────────────────────────────────────────────── -->
        <div class="card-header">
            <div class="logo-circle">
                <img src="images/images.jpg" alt="LP Technotherm Logo">
            </div>
            <h1>Επαναφορά Κωδικού</h1>
            <p class="header-subtitle">LP Technotherm - Σύστημα εγκαταστάσεων</p>
        </div>

        <!-- ── Body ──────────────────────────────────────────────────── -->
        <div class="card-body">

            <!-- Alert messages -->
            <div id="alertSuccess" class="alert success"></div>
            <div id="alertError" class="alert error"></div>

            <form action="/Backend/Passwordreset/Forgot_password.php" method="POST">

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Διεύθυνση Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <!-- mail icon -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <rect x="2" y="4" width="20" height="16" rx="2" />
                                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                            </svg>
                        </span>
                        <input type="email" id="email" name="email" placeholder="name@company.com" required autofocus>
                    </div>
                </div>

                <button type="submit" class="btn">
                    <!-- send icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m22 2-7 20-4-9-9-4Z" />
                        <path d="M22 2 11 13" />
                    </svg>
                    Αποστολή Συνδέσμου
                </button>
            </form>

            <div class="links">
                <a href="/login/login.html">← Επιστροφή στη Σύνδεση</a>
            </div>
        </div>
    </div>

    <script>
        // Read ?success=... or ?error=... from the URL query string
        const params = new URLSearchParams(window.location.search);
        const success = params.get('success');
        const error = params.get('error');

        if (success) {
            const el = document.getElementById('alertSuccess');
            el.textContent = decodeURIComponent(success);
            el.style.display = 'block';
        }
        if (error) {
            const el = document.getElementById('alertError');
            el.textContent = decodeURIComponent(error);
            el.style.display = 'block';
        }
    </script>
</body>

</html>
